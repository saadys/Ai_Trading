services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend # Ton Dockerfile FastAPI
    container_name: backend_server
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - mlflow-network
    restart: always
    depends_on:
      - db
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend # Ton Dockerfile NGINX
    container_name: frontend_server
    ports:
      - "80:80"
    networks:
      - mlflow-network
    restart: always
    depends_on:
      - backend

  #rabbitmq:
  rabbitmq:
    image: "rabbitmq:3-management-alpine"
    container_name: "rabbitmq"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "myadmin"
      RABBITMQ_DEFAULT_PASS: "mypassword"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    restart: always
    networks:
      - mlflow-network

  #postgresql database:
  db:
    image: postgres:15
    container_name: postgres_db
    ports:
      - "5432:5432"
    env_file:
      - ./env/.env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mlflow-network
    #postgres exporter:
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    ports:
      - "9187:9187"
    env_file:
      - ./env/.env.postgres-exporter
    depends_on:
      - db
    restart: always
    networks:
      - mlflow-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_server
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - mlflow-network
    restart: always

  # mlflow server:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow_server
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:saadys@db:5432/mlflow_db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    command: mlflow server --backend-store-uri postgresql://postgres:saadys@db:5432/mlflow_db --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    restart: always
    networks:
      - mlflow-network

  # Prometheus Monitoring:
  prometheus:
    image: prom/prometheus
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./Prometheus/Prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mlflow-network
    restart: always

  # Grafana Monitoring:
  grafana:
    image: grafana/grafana:11.6.0-ubuntu
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    env_file:
      - ./env/.env.grafana
    depends_on:
      - prometheus
    networks:
      - mlflow-network
    restart: always

  # Node Exporter for system metrics
  node_exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - mlflow-network
    restart: always

networks:
  mlflow-network:
    driver: bridge

volumes:
  rabbitmq_data: {}
  postgres_data: {}
  prometheus_data: {}
  grafana_data: {}
  mlflow_artifacts: {}
