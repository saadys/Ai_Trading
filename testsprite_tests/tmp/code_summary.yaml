version: "2"
type: backend
tech_stack:
  - Python
  - FastAPI
  - PostgreSQL
  - SQLAlchemy
  - RabbitMQ
features:
  - name: Root API
    description: Root endpoints for app health and info
    files:
      - app/routers/base.py
    endpoints:
      - method: GET
        path: /Root/v1/
        description: Root endpoint returning app name and version
        auth_required: false
  - name: Streaming API
    description: Control streaming processor
    files:
      - app/routers/streaming_routers.py
    endpoints:
      - method: GET
        path: /Root/v1/Streaming/status
        description: Get StreamProcessor status
        auth_required: false
      - method: POST
        path: /Root/v1/Streaming/start
        description: Start stream processor
        auth_required: false
      - method: POST
        path: /Root/v1/Streaming/stop
        description: Stop stream processor
        auth_required: false
known_limitations: []
